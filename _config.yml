# Site settings
title: Toshi's DIY Works
email: toshi.ueba@gmail.com
# 仮のURL
url: https://ueba.sakura.ne.jp/diy
description: "A site showcasing DIY projects created by Toshi."
keywords: "diy,hand craft,wood"
skills: "Make anything with DIY. Wood, Cloth, Digital, Drawing etc."
meta_author: Toshi Ueba

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
# disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 18bc9c #80B3FF
  primary-rgb: "24,288,156" #"128,179,255"
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Toshi
  location: Aichi Japan
  social: Around the Web
  credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: instagram
    url: https://www.instagram.com/toshiueba3
  - title: blog
    url: http://ueba.sakura.ne.jp
  - title: github
    url: http://github.com/toshiueba

# Postal address (add as many lines as necessary)
address:
  - line: Okazaki city
  - line: Aichi Japan

# Credits content
credits: 'free to link. powerd by GitHub Jekyll and Freelancer theme.'

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""
